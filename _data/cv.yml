    Projects:
      - name: "Learn to Merge Tokens for Communication-Efficient Collaborative Occupancy Prediction"
        summary: >
          Ongoing research on communication-efficient collaborative 3D semantic occupancy prediction
          for autonomous driving, focusing on tokenized scene representation, spatio-temporal memory,
          and task-aware communication under bandwidth constraints.
        highlights:
          - "Designed a collaborative occupancy prediction framework with tokenized spatio-temporal memory for multi-agent scene understanding"
          - "Developed communication-aware token merging strategies to reduce transmission redundancy while preserving task-critical information"
          - "Implemented request-conditioned communication, multi-agent feature alignment, and Transformer-based temporal modeling in a unified 3D world coordinate system"
          - "Built large-scale training and evaluation pipelines on collaborative perception datasets, analyzing communication cost, memory efficiency, and occupancy prediction accuracy"

      - name: "Rate-Distortion in Efficient Multi-Agent Perception: A Unified Framework for Communication and Memory Optimization"
        summary: >
          Ongoing research on a unified rate-distortion perspective for efficient multi-agent perception,
          jointly optimizing communication bandwidth and spatio-temporal memory usage in collaborative
          autonomous driving systems.
        highlights:
          - "Formulated multi-agent perception as a joint communication-memory optimization problem under rate-distortion constraints"
          - "Investigated unified token selection, token compression, and memory update strategies for balancing perceptual utility against resource cost"
          - "Developed theoretical and algorithmic designs for communication-efficient and memory-aware perception pipelines in collaborative driving scenarios"
          - "Planned empirical evaluation on collaborative occupancy prediction benchmarks with analysis of accuracy–bandwidth–memory trade-offs"

      - name: "Federated Learning for Medical Image Segmentation with Domain Generalization"
        summary: >
          Master's course research project investigating privacy-preserving medical image segmentation
          under cross-institution domain shift using federated learning and domain generalization.
        highlights:
          - "Implemented a federated learning framework using FedAvg for multi-institution medical image segmentation without sharing raw patient data"
          - "Designed domain generalization strategies including style transfer augmentation and cross-client feature distribution alignment"
          - "Built a U-Net–based segmentation pipeline and evaluated cross-domain generalization across heterogeneous medical datasets"
          - "Studied the interaction between privacy-preserving distributed training and domain shift mitigation in medical imaging"

      - name: "Jetson-Based Autonomous Driving System"
        summary: >
          Undergraduate project implementing a real-time autonomous driving pipeline on NVIDIA Jetson,
          integrating multi-modal perception, behavior planning, and embedded control.
        highlights:
          - "Developed a perception pipeline combining camera vision and radar sensing for traffic light recognition and obstacle detection"
          - "Trained and deployed lightweight YOLO-based object detection models optimized with TensorRT for embedded GPU inference"
          - "Implemented lane detection using perspective transformation, Canny edge detection, and Hough transform"
          - "Designed a rule-based behavior planner and proportional steering controller for lane following and crosswalk-aware speed regulation"

      - name: "NAO Robot Autonomous Ball Search and Kick System"
        summary: >
          Embodied AI robotics project implementing autonomous ball detection, navigation,
          and kicking behaviors on the NAO humanoid robot platform.
        highlights:
          - "Built a real-time vision pipeline using HSV color segmentation and contour detection for soccer ball localization"
          - "Estimated ball distance using a pinhole camera model and visual geometry"
          - "Implemented robot locomotion and kicking behaviors through NAOqi motion control APIs"
          - "Designed a finite-state behavior controller for autonomous search, approach, alignment, and kick execution"

      - name: "Embedded Face Recognition Access Control System"
        summary: >
          Undergraduate thesis project implementing an edge AI access control system
          with lightweight face recognition on STM32 microcontrollers.
        highlights:
          - "Designed a lightweight face recognition pipeline based on MobileFaceNet embeddings with cosine similarity matching"
          - "Applied TinyML optimization techniques including model pruning, INT8 quantization, and TensorFlow Lite Micro deployment"
          - "Integrated ESP8266 Wi-Fi module and Baidu Cloud IoT platform for MQTT-based remote communication"
          - "Developed an Android application for remote device monitoring, user registration, and access control management"
