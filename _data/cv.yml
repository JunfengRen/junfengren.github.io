    Projects:
    - name: Collaborative 3D Semantic Occupancy Prediction
      summary: >
        Research project on collaborative perception for autonomous driving,
        focusing on efficient multi-agent communication and 3D scene understanding.

      highlights:
        - Designed a sparse communication framework for collaborative 3D semantic occupancy prediction
        - Performed multi-agent perception alignment and feature fusion in a unified 3D world coordinate system
        - Utilized Transformer-based spatio-temporal modeling for occupancy reasoning
        - Achieved competitive prediction accuracy while significantly reducing communication and memory overhead

    - name: Federated Medical Image Segmentation with Domain Adaptation
      summary: >
        Research on federated learning for medical image segmentation under privacy constraints
        and cross-institution domain shifts.

      highlights:
        - Developed a federated learning framework for multi-center medical imaging datasets
        - Introduced domain style transfer and feature alignment strategies to mitigate domain shift
        - Enabled collaborative training across multiple clients without sharing raw data
        - Improved segmentation generalization across heterogeneous medical datasets

    - name: Atrial Fibrillation Detection from ECG Signals
      summary: >
        Deep learning based classification system for detecting atrial fibrillation (AF) from ECG signals.

      highlights:
        - Built deep neural network models to classify AF and non-AF signals
        - Performed ECG preprocessing and temporal feature modeling
        - Evaluated different neural architectures on standard ECG datasets

    - name: IoT Data Monitoring and Analysis System
      summary: >
        Designed an IoT-based data monitoring and analytics system with real-time visualization and analysis.

      highlights:
        - Implemented data acquisition and analysis pipeline for IoT sensor networks
        - Developed visualization tools for real-time monitoring
        - Received software copyright as first author

    - name: Embedded Face Recognition Access Control System
      summary: >
        Embedded access control system based on deep learning face recognition.

      highlights:
        - Implemented FaceNet-based face recognition on embedded hardware platforms
        - Integrated STM32, ESP8266, and MAIX2DOCK modules
        - Designed MQTT communication and Android-based remote control interface
